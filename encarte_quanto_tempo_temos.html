<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encarte - Quanto Tempo Temos? | Diva Pop</title>
  <meta name="description" content="Encarte imersivo do álbum 'Quanto Tempo Temos?' — arte + fotos + áudio faixa a faixa." />
  <meta property="og:title" content="Encarte - Quanto Tempo Temos? | Diva Pop" />
  <meta property="og:description" content="Experiência vinil retrô + neon moderno: encarte com áudio faixa a faixa." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="pt_BR" />
  <meta property="og:site_name" content="Diva Pop" />
  <meta property="og:image" content="assets/og_divapop.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta name="theme-color" content="#000000">
  <style>
    :root{ --neon:#e63946; --cream:#f5f5dc; }

    body{
      margin:0;
      background:#000;
      color:#fff;
      font-family:'Poppins',sans-serif;
      overflow:hidden;
      height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
    }

    .stage{
      position:relative;
      width:92vw;
      height:calc(100vh - 120px);
      margin:18px auto 0;
      border-radius:16px;
      box-shadow:0 0 34px rgba(230,57,70,.55);
      overflow:hidden;
      background: radial-gradient(ellipse at center, rgba(230,57,70,.08) 0%, rgba(0,0,0,0) 60%);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .spread{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:2.5vh 2.5vw;
      box-sizing:border-box;
      gap:1.5vw;
    }

    .page{
      flex:1;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:1;
      transition:opacity 1.2s ease;
      position:relative;
    }

    .page.hidden{ opacity:0; }

    .page img{
      max-width:100%;
      max-height:100%;
      width:auto;
      height:auto;
      object-fit:contain;
      border-radius:12px;
      box-shadow:0 0 30px rgba(230,57,70,.55);
    }

    /* modo single */
    .spread.single{ justify-content:center; }
    .spread.single .page.left{ display:none; }
    .spread.single .page.right{ flex:0 1 70%; }

    .fallback{
      width:100%;
      height:100%;
      border-radius:12px;
      border:1px dashed rgba(245,245,220,.25);
      background: rgba(0,0,0,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:16px;
      line-height:1.6;
      color:#f5f5dc;
      box-shadow:0 0 18px rgba(230,57,70,.18);
    }
    .fallback b{ color: var(--neon); }

    .bottombar{
      width:92vw;
      height:92px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:10px 0 18px;
      box-sizing:border-box;
    }

    audio{
      width:min(420px, 92vw);
      border-radius:28px;
      box-shadow:0 0 26px rgba(230,57,70,.85);
      border:2px solid var(--neon);
      background: rgba(0,0,0,.85);
    }

    .hint{
      padding:10px 14px;
      border:1px solid rgba(230,57,70,.65);
      box-shadow:0 0 18px rgba(230,57,70,.35);
      border-radius:14px;
      background:rgba(0,0,0,.55);
      font-size:13px;
      color:#f5f5dc;
      user-select:none;
      white-space:nowrap;
      pointer-events:none;
    }
    .hint b{ color: var(--neon); font-weight:600; }

    .dlbtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      border-radius:999px;
      padding:10px 16px;
      font-weight:600;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(230,57,70,.75);
      color: #fff;
      box-shadow: 0 0 18px rgba(230,57,70,.18);
      transition: transform .25s ease, box-shadow .35s, background-color .35s;
      min-width: 170px;
      user-select:none;
    }
    .dlbtn:hover{ background: rgba(230,57,70,.18); box-shadow:0 0 22px rgba(230,57,70,.55); transform: translateY(-1px); }
    .dlbtn[aria-disabled="true"]{ opacity:.45; pointer-events:none; }

    @media (max-width: 900px){
      .spread{ padding:2vh 2vw; gap:2vw; }
      .spread.single .page.right{ flex:0 1 92%; }
      .bottombar{ justify-content:center; gap:10px; }
      .hint{ display:none; }
      .dlbtn{ min-width: 150px; }
    }

    @media (max-width: 720px){
      .stage{ height:calc(100vh - 96px); margin-top:10px; }
      .spread{ flex-direction:column; justify-content:center; }
      .page{ height:50%; }
      .spread.single .page.right{ flex:1; }
      .bottombar{ height:72px; padding-bottom:10px; }
      .dlbtn{ display:none; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div id="spread" class="spread single">
      <div class="page left">
        <img id="leftImage" src="" alt="" />
        <div id="leftFallback" class="fallback" style="display:none;"><div><b>Arquivo não encontrado</b><br><span id="leftPath"></span></div></div>
      </div>
      <div class="page right">
        <img id="rightImage" src="" alt="" />
        <div id="rightFallback" class="fallback" style="display:none;"><div><b>Arquivo não encontrado</b><br><span id="rightPath"></span></div></div>
      </div>
    </div>
  </div>

  <div class="bottombar">
    <audio id="player" controls preload="metadata"></audio>
    <a id="downloadBtn" class="dlbtn no-advance" href="#" download aria-disabled="true" title="Baixar a faixa atual">⬇️ Baixar faixa</a>
    <div class="hint"><b>Clique</b> em qualquer lugar para avançar</div>
  </div>

  <script>
    // ===== Analytics local (para área_restrita.html) =====
    const DP_STATS_KEY = 'divapop_stats_v1';

    function dpLoad(){
      try{
        const raw = localStorage.getItem(DP_STATS_KEY);
        if(!raw) return { v:1, pages:{}, plays:{}, downloads:{}, updatedAt:null };
        const s = JSON.parse(raw);
        return { v:1, pages: s.pages||{}, plays: s.plays||{}, downloads: s.downloads||{}, updatedAt: s.updatedAt||null };
      }catch(e){
        return { v:1, pages:{}, plays:{}, downloads:{}, updatedAt:null };
      }
    }

    function dpSave(s){
      try{ s.updatedAt = new Date().toISOString(); }catch(e){}
      localStorage.setItem(DP_STATS_KEY, JSON.stringify(s));
    }

    function dpInc(kind, key){
      if(!key) return;
      const s = dpLoad();
      const bucket = (kind === 'plays') ? s.plays : (kind === 'downloads') ? s.downloads : s.pages;
      bucket[key] = (Number(bucket[key])||0) + 1;
      dpSave(s);
    }

    function dpPageName(){
      const last = (location.pathname || '').split('/').pop();
      return last || 'encarte_quanto_tempo_temos.html';
    }

    // ===== Conteúdo do encarte =====
    const pages = [
      { mode:'single', right: 'encarte_quanto_tempo_temos/1_capa_quanto_tempo_temos.png', song: null },

      { mode:'double', left:'fotos_quanto_tempo_temos/relicas.jpg',   right:'encarte_quanto_tempo_temos/2_quanto_tempo_temos.png',   song:['musicas_quanto_tempo_temos/1_quanto_tempo_temos.mp3','musicas_quanto_tempo_temos/1_quanto_tempo_temos.MP3'] },
      { mode:'double', left:'fotos_quanto_tempo_temos/vermelhos.png', right:'encarte_quanto_tempo_temos/3_banalizados.png',          song:['musicas_quanto_tempo_temos/2_banalizados.mp3','musicas_quanto_tempo_temos/2_banalizados.MP3'] },
      { mode:'double', left:'fotos_quanto_tempo_temos/prabaixo.png',  right:'encarte_quanto_tempo_temos/4_esse_pais.png',            song:['musicas_quanto_tempo_temos/3_esse_pais.mp3','musicas_quanto_tempo_temos/3_esse_pais.MP3'] },
      { mode:'double', left:'fotos_quanto_tempo_temos/chao.png',      right:'encarte_quanto_tempo_temos/5_batalhas.png',             song:['musicas_quanto_tempo_temos/4_batalhas.mp3','musicas_quanto_tempo_temos/4_batalhas.MP3'] },
      { mode:'double', left:'fotos_quanto_tempo_temos/porta.png',     right:'encarte_quanto_tempo_temos/6_abra_seus_olhos.png',      song:['musicas_quanto_tempo_temos/5_abra_seus_olhos.mp3','musicas_quanto_tempo_temos/5_abra_seus_olhos.MP3'] },
      { mode:'double', left:'fotos_quanto_tempo_temos/poste.png',     right:'encarte_quanto_tempo_temos/7_modernidade.png',          song:['musicas_quanto_tempo_temos/6_modernidade.mp3','musicas_quanto_tempo_temos/6_modernidade.MP3'] },
      { mode:'double', left:'fotos_quanto_tempo_temos/enforcada.png', right:'encarte_quanto_tempo_temos/8_caminhando.png',           song:['musicas_quanto_tempo_temos/7_caminhando.mp3','musicas_quanto_tempo_temos/7_caminhando.MP3'] },
      { mode:'double', left:'fotos_quanto_tempo_temos/dog.png',       right:'encarte_quanto_tempo_temos/9_ilha_das_flores.png',      song:['musicas_quanto_tempo_temos/8_ilha_das_flores.mp3','musicas_quanto_tempo_temos/8_ilha_das_flores.MP3'] },
      { mode:'double', left:'fotos_quanto_tempo_temos/luz.png',       right:'encarte_quanto_tempo_temos/10_fim_dos_tempos.png',      song:['musicas_quanto_tempo_temos/9_fim_dos_tempos.mp3','musicas_quanto_tempo_temos/9_fim_dos_tempos.MP3'] },

      { mode:'single', right: 'encarte_quanto_tempo_temos/12_citacao.png', song: null },
      { mode:'single', right: ['encarte_quanto_tempo_temos/11_créditos_quanto_tempo_temos.png','encarte_quanto_tempo_temos/11_creditos_quanto_tempo_temos.png'], song: null },
      { mode:'single', right: 'encarte_quanto_tempo_temos/13_contra_capa.png', song: null },
    ];

    let currentPage = 0;
    let currentTrackKey = null;

    const spread = document.getElementById('spread');
    const leftImg = document.getElementById('leftImage');
    const rightImg = document.getElementById('rightImage');
    const leftFb = document.getElementById('leftFallback');
    const rightFb = document.getElementById('rightFallback');
    const leftPath = document.getElementById('leftPath');
    const rightPath = document.getElementById('rightPath');
    const player = document.getElementById('player');
    const dlBtn = document.getElementById('downloadBtn');

    function setDownload(url){
      currentTrackKey = url || null;
      if(!url){
        dlBtn.setAttribute('aria-disabled','true');
        dlBtn.removeAttribute('href');
        dlBtn.removeAttribute('download');
        return;
      }
      dlBtn.setAttribute('aria-disabled','false');
      dlBtn.href = url;
      const name = url.split('/').pop() || 'divapop.mp3';
      dlBtn.setAttribute('download', name);
    }

    function setMode(mode){
      if(mode === 'single') spread.classList.add('single');
      else spread.classList.remove('single');
    }

    function fadeOut(){
      spread.querySelector('.page.left')?.classList.add('hidden');
      spread.querySelector('.page.right')?.classList.add('hidden');
    }

    function fadeIn(){
      spread.querySelector('.page.left')?.classList.remove('hidden');
      spread.querySelector('.page.right')?.classList.remove('hidden');
    }

    function setImg(imgEl, fbEl, pathEl, src, alt){
      fbEl.style.display = 'none';
      pathEl.textContent = '';
      imgEl.style.display = 'block';
      imgEl.alt = alt;
      imgEl.onerror = () => {
        imgEl.style.display = 'none';
        fbEl.style.display = 'flex';
        pathEl.textContent = src;
        console.warn('[DivaPop] Imagem não encontrada:', src);
      };
      imgEl.src = src;
    }

    function setRightWithFallback(sources){
      const list = Array.isArray(sources) ? sources : [sources];
      let i = 0;

      rightFb.style.display = 'none';
      rightPath.textContent = '';
      rightImg.style.display = 'block';

      const tryNext = () => {
        const src = list[i];
        rightImg.alt = 'Página do encarte';
        rightImg.onerror = () => {
          i++;
          if(i < list.length){
            console.warn('[DivaPop] Tentando fallback de imagem:', list[i]);
            rightImg.src = list[i];
            return;
          }
          rightImg.style.display = 'none';
          rightFb.style.display = 'flex';
          rightPath.textContent = src;
          console.warn('[DivaPop] Imagem não encontrada:', src);
        };
        rightImg.src = src;
      };

      tryNext();
    }

    async function tryPlay(list){
      for(const src of list){
        currentTrackKey = src;
        player.src = src;
        try{
          await player.play();
          setDownload(src);
          return true;
        }catch(e){
          console.warn('[DivaPop] Falha ao tocar, tentando outro nome:', src);
        }
      }
      return false;
    }

    function startAudioForPage(idx){
      const song = pages[idx].song;
      if(!song){
        player.pause();
        player.removeAttribute('src');
        player.load();
        setDownload(null);
        return;
      }
      const list = Array.isArray(song) ? song : [song];
      tryPlay(list).then((ok)=>{ if(!ok){ setDownload(null); console.warn('[DivaPop] Nenhuma variação do áudio tocou.'); } });
    }

    function renderPage(idx){
      const page = pages[idx];

      setMode(page.mode);
      fadeOut();

      setTimeout(() => {
        if(page.mode === 'single'){
          setRightWithFallback(page.right);
          leftImg.removeAttribute('src');
          leftFb.style.display = 'none';
          leftPath.textContent = '';
        } else {
          setImg(leftImg, leftFb, leftPath, page.left, 'Foto da banda');
          setRightWithFallback(page.right);
        }
        fadeIn();
      }, 820);
    }

    // ===== Métricas =====
    window.addEventListener('load', () => {
      dpInc('pages', dpPageName());
      renderPage(0);
      setDownload(null);
    });

    player.addEventListener('play', ()=>{ if(currentTrackKey) dpInc('plays', currentTrackKey); });

    dlBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      if(dlBtn.getAttribute('aria-disabled') !== 'true' && currentTrackKey){
        dpInc('downloads', currentTrackKey);
      }
    });

    document.body.addEventListener('click', (e) => {
      if(e.target && (e.target.tagName === 'AUDIO' || e.target.closest('audio') || e.target.closest('.no-advance'))) return;
      if(currentPage < pages.length - 1){
        currentPage++;
        startAudioForPage(currentPage);
        renderPage(currentPage);
      }
    });
  </script>
</body>
</html>
