<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discografia Completa | Diva Pop</title>
<meta name="description" content="Discografia completa da Diva Pop — encartes imersivos com áudio faixa a faixa, estética vinil retrô + neon moderno." />
<meta property="og:title" content="Discografia Completa | Diva Pop" />
<meta property="og:description" content="Encarte premium com áudio + fotos + arte, faixa a faixa." />
<meta property="og:image" content="assets/og_divapop.jpg" />
<meta property="og:type" content="website" />
<meta property="og:locale" content="pt_BR" />
<meta property="og:site_name" content="Diva Pop" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="theme-color" content="#000000">
<style>
:root{ --neon:#e63946; --cream:#f5f5dc; }
body {
  background-color: #000;
  color: var(--cream);
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  animation: fadeIn 1.2s ease-in-out;
}
@keyframes fadeIn {
  from { opacity: 0; filter: brightness(0.5); }
  to { opacity: 1; filter: brightness(1); }
}
nav {
  background-color: rgba(0, 0, 0, 0.85);
  text-align: center;
  padding: 12px 0;
  border-top: 2px solid var(--neon);
  border-bottom: 2px solid var(--neon);
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(6px);
}
nav a {
  color: #fff;
  text-decoration: none;
  margin: 0 14px;
  font-weight: 600;
  transition: color 0.3s;
  display: inline-block;
  padding: 6px 2px;
}
nav a:hover { color: var(--neon); }
header {
  text-align: center;
  padding: 56px 20px 10px 20px;
}
header h1 {
  font-size: 2.4rem;
  color: var(--neon);
  text-shadow: 0 0 15px var(--neon);
  letter-spacing: 2px;
  margin: 0;
}
header p {
  color: var(--cream);
  font-size: 1rem;
  margin-top: 12px;
}
.divider {
  width: min(820px, 92vw);
  height: 1px;
  margin: 26px auto 0;
  background: linear-gradient(90deg, transparent, rgba(230,57,70,.9), transparent);
  box-shadow: 0 0 16px rgba(230,57,70,.25);
}
.discografia-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  padding: 34px;
  text-align: center;
  max-width: 1200px;
  margin: 0 auto;
}
.album-card {
  background: radial-gradient(ellipse at top, rgba(230,57,70,.10) 0%, rgba(17,17,17,1) 55%);
  border-radius: 22px;
  box-shadow: 0 0 25px rgba(230, 57, 70, 0.28);
  transition: transform 0.5s ease, box-shadow 0.5s ease;
  padding: 18px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.album-card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 0 44px rgba(230, 57, 70, 0.75);
}
.album-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(230, 57, 70, 0.14), rgba(0, 0, 0, 0.85));
  opacity: 0;
  transition: opacity 0.5s ease;
  border-radius: 22px;
}
.album-card:hover::before { opacity: 1; }

.album-cover{
  width:100%;
  border-radius:16px;
  box-shadow:0 0 18px rgba(230,57,70,.52);
  position:relative;
  z-index:1;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  background: rgba(0,0,0,.35);
}

.album-title {
  margin: 14px 0 0;
  font-size: 1.25rem;
  color: var(--cream);
  text-shadow: 0 0 5px rgba(255,255,255,0.15);
  position: relative;
  z-index: 1;
}
.btn-group {
  margin-top: 18px;
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}
button {
  background-color: var(--neon);
  border: none;
  color: #fff;
  padding: 10px 18px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 600;
  transition: transform 0.25s ease, box-shadow 0.35s, background-color 0.35s;
  min-width: 160px;
}
button:hover {
  background-color: #ff4757;
  box-shadow: 0 0 22px var(--neon);
  transform: translateY(-1px);
}
button.secondary{
  background: rgba(0,0,0,.55);
  border: 1px solid rgba(230,57,70,.75);
}
button.secondary:hover{
  background: rgba(230,57,70,.18);
}
.fade-out { opacity: 0; transition: opacity 1s ease; }
footer {
  text-align: center;
  padding: 30px;
  font-size: 0.9rem;
  color: #aaa;
  background-color: #111;
  box-shadow: 0 -5px 15px rgba(230, 57, 70, 0.2);
}
#preloader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  color: var(--neon);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 1.5rem;
  z-index: 9999;
}
/* scroll reveal (leve, sem pesar) */
.reveal{ opacity:0; transform: translateY(14px); transition: opacity .8s ease, transform .8s ease; will-change: opacity, transform; }
.reveal.is-visible{ opacity:1; transform:none; }
@media (prefers-reduced-motion: reduce){ .reveal{ opacity:1; transform:none; transition:none; } }

@media (max-width: 720px){
  header{ padding-top: 34px; }
  header h1{ font-size: 1.9rem; }
  .discografia-container{ padding: 22px; gap: 18px; }
  button{ min-width: 140px; }
  nav a{ margin: 0 10px; }
}
</style>
</head>
<body>
<div id="preloader">✨ Aguarde... o show vai começar ✨</div>

<nav>
  <a href="index.html">Início</a>

  <a href="discografia_completa.html">Discografia</a>

  <a href="presskit_oficial.html">Press Kit</a>
  <a href="contato_contrate_diva_pop.html">Contato</a>

</nav>

<header>
  <h1>Discografia Completa</h1>
  <p>Entre a inocência que nasce e a experiência que pulsa</p>
  <div class="divider"></div>
</header>

<section class="discografia-container">
  <div class="album-card" onclick="abrirEncarte('encarte_quanto_tempo_temos.html')" role="button" tabindex="0">
    <img src="capas/capa_quanto_tempo_temos.png" alt="Capa do álbum Quanto Tempo Temos?" class="album-cover"
      onerror="this.onerror=null; this.src='capas/capa_quanto_tempo_temos.jpg';" />
    <h2 class="album-title">Quanto Tempo Temos?</h2>
    <div class="btn-group">
      <button onclick="event.stopPropagation(); abrirEncarte('encarte_quanto_tempo_temos.html')">🎧 Ouvir Encarte</button>
      <button class="secondary" onclick="event.stopPropagation(); window.location.href='pix_apoiar.html'">💝 Apoiar via PIX</button>
    </div>
  </div>

  <div class="album-card" onclick="abrirEncarte('encarte_carnaval.html')" role="button" tabindex="0">
    <img src="capas/capa_carnaval.png" alt="Capa do EP Carnaval" class="album-cover"
      onerror="this.onerror=null; this.src='capas/capa_carnaval.jpg';" />
    <h2 class="album-title">Carnaval</h2>
    <div class="btn-group">
      <button onclick="event.stopPropagation(); abrirEncarte('encarte_carnaval.html')">🎧 Ouvir Encarte</button>
      <button class="secondary" onclick="event.stopPropagation(); window.location.href='pix_apoiar.html'">💝 Apoiar via PIX</button>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Diva Pop. Todos os direitos reservados.</p>
</footer>

<script>
window.addEventListener('load', () => {
  const preloader = document.getElementById('preloader');
  setTimeout(() => preloader.style.display = 'none', 1200);
});
function abrirEncarte(url) {
  document.body.classList.add('fade-out');
  setTimeout(() => { window.location.href = url; }, 900);
}
// acessibilidade: Enter/Espaço nos cards
for (const card of document.querySelectorAll('.album-card')){
  card.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      card.click();
    }
  });
}

// scroll reveal (auto)
(function(){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce) return;
  const targets = [];
  document.querySelectorAll('header, .album-card, footer').forEach(el=>{
    if(!el.classList.contains('reveal')){ el.classList.add('reveal'); targets.push(el); }
  });
  const io = new IntersectionObserver((entries)=>{
    for(const e of entries){
      if(e.isIntersecting){ e.target.classList.add('is-visible'); io.unobserve(e.target); }
    }
  }, {threshold:0.12, rootMargin:'0px 0px -10% 0px'});
  targets.forEach(t=>io.observe(t));
})();
</script>
</body>
</html>
